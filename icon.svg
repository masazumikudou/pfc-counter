<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <circle cx="50" cy="50" r="50" fill="#E60012"/>

  <!-- Fork (left, tilted -22deg) -->
  <g transform="rotate(-22, 35, 46)" fill="white">
    <rect x="30"   y="16" width="2.5" height="20" rx="1.25"/>
    <rect x="33.5" y="16" width="2.5" height="20" rx="1.25"/>
    <rect x="37"   y="16" width="2.5" height="20" rx="1.25"/>
    <rect x="32.5" y="34" width="5"   height="36" rx="2.5"/>
  </g>

  <!-- Knife (right, tilted +22deg) -->
  <g transform="rotate(22, 65, 46)" fill="white">
    <path d="M65,16 L69,51 L61,51 Z"/>
    <rect x="60.5" y="51" width="9" height="3.5" rx="0.5"/>
    <rect x="62.5" y="54.5" width="5" height="19" rx="2.5"/>
  </g>

  <!-- PFC -->
  <text x="50" y="91"
        text-anchor="middle"
        fill="white"
        font-family="'Arial Black', Arial, sans-serif"
        font-size="12"
        font-weight="900"
        letter-spacing="3">PFC</text>
</svg>
