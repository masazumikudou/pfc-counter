<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PFCカウンター</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    :root {
      --red: #E60012; --green: #43B047; --blue: #2A6FD6;
      --cream: #FFF8E7; --ink: #1A1A1A; --muted: #555555; --orange: #FF9F00;
      --purple: #8B5CF6;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Kaku Gothic ProN", sans-serif;
      font-weight: 900;
      background-image: linear-gradient(180deg, #8FCDF0 0%, #B8E0F5 60%, #FFF8E7 100%);
      background-attachment: fixed; color: var(--ink); margin: 0; padding: 24px 16px;
      display: flex; justify-content: center;
    }
    .container { width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 20px; }
    .header { background: var(--red); border: 4px solid var(--ink); border-radius: 24px; padding: 18px; text-align: center; box-shadow: 0 8px 0 var(--ink); }
    .header h1 { font-size: 28px; color: white; margin: 0 0 6px 0; text-shadow: -2px 0 var(--ink), 2px 0 var(--ink), 0 -2px var(--ink), 0 2px var(--ink); }
    .subtitle-pill { display: inline-block; background: var(--ink); color: white; font-size: 10px; padding: 4px 12px; border-radius: 999px; font-weight: 900; }
    .card { background: white; border: 4px solid var(--ink); border-radius: 22px; padding: 18px; box-shadow: 0 8px 0 var(--ink); position: relative; }
    .card-title { font-size: 14px; font-weight: 900; margin-bottom: 12px; }
    .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .status-box { text-align: center; padding: 8px 4px; border: 3px solid var(--ink); border-radius: 16px; background: #fafafa; }
    .status-label { font-size: 11px; font-weight: 900; margin-bottom: 2px; }
    .status-value { font-size: 24px; font-weight: 900; }
    .status-unit { font-size: 11px; margin-left: 1px; }
    .sub-status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .sub-box { border: 2px solid var(--ink); border-radius: 12px; padding: 6px; text-align: center; font-size: 12px; background: #fff; }
    .sub-val { font-size: 16px; font-weight: 900; }
    .form-group { margin-bottom: 12px; position: relative; }
    label { font-size: 13px; font-weight: 900; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .badge { background: var(--red); color: white; font-size: 9px; border-radius: 999px; padding: 1px 6px; border: 2px solid var(--ink); }
    input[type="text"], input[type="number"] { width: 100%; background: var(--cream); border: 3px solid var(--ink); border-radius: 12px; padding: 10px 12px; font-size: 16px; font-weight: 900; color: var(--ink); outline: none; }
    select { width: 100%; background: var(--cream); border: 3px solid var(--ink); border-radius: 12px; padding: 10px 12px; font-size: 16px; font-weight: 900; color: var(--ink); outline: none; appearance: none; }
    .suggest-box { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 3px solid var(--ink); border-radius: 12px; max-height: 200px; overflow-y: auto; z-index: 10; display: none; margin-top: 4px; box-shadow: 0 6px 0 rgba(0,0,0,0.15); }
    .suggest-item { padding: 10px 12px; border-bottom: 2px solid var(--cream); cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
    .suggest-item:active { background: var(--cream); }
    .suggest-meta { font-size: 11px; color: var(--muted); }
    .btn-main { width: 100%; background: var(--red); color: white; border: 4px solid var(--ink); border-radius: 18px; padding: 14px; font-size: 18px; font-weight: 900; letter-spacing: 2px; box-shadow: 0 6px 0 var(--ink); cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }
    .btn-main:active { transform: translateY(5px); box-shadow: 0 1px 0 var(--ink); }
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; }
    .btn-sub { width: 100%; color: white; border: 4px solid var(--ink); padding: 12px; font-size: 13px; font-weight: 900; cursor: pointer; display: flex; justify-content: center; align-items: center; border-radius: 16px; }
    .btn-green { background: var(--green); box-shadow: 0 5px 0 var(--ink); }
    .btn-blue { background: var(--blue); box-shadow: 0 5px 0 var(--ink); }
    .btn-purple { background: var(--purple); box-shadow: 0 5px 0 var(--ink); }
    .log-list { margin-top: 10px; max-height: 200px; overflow-y: auto; }
    .log-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 2px solid #e5e5ea; font-size: 13px; }
    .log-values { font-weight: 900; font-size: 13px; text-align: right; }
    .graph-tab-bar { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 4px; margin-bottom: 12px; }
    .graph-tab-btn { padding: 6px 2px; border: 2px solid var(--ink); border-radius: 8px; font-size: 10px; font-weight: 900; cursor: pointer; background: #f0f0f0; text-align: center; }
    .graph-tab-btn.active { background: var(--ink); color: white; }
    .qty-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal { background: white; border: 4px solid var(--ink); border-radius: 22px; padding: 24px; width: 100%; max-width: 400px; box-shadow: 0 8px 0 var(--ink); max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-size: 20px; margin: 0 0 16px 0; text-align: center; }
    .profile-summary { background: var(--cream); border: 2px solid var(--ink); border-radius: 12px; padding: 10px 14px; font-size: 12px; margin-bottom: 12px; line-height: 1.8; }

    /* ===== 週間ビュー ===== */
    .week-card { background: white; border: 4px solid var(--ink); border-radius: 22px; padding: 16px; box-shadow: 0 8px 0 var(--ink); overflow: hidden; }
    .week-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .week-title { font-size: 14px; font-weight: 900; }
    .week-nav { display: flex; gap: 8px; }
    .week-nav-btn { background: var(--ink); color: white; border: none; border-radius: 8px; width: 32px; height: 32px; font-size: 16px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .week-nav-btn:disabled { background: #ccc; cursor: default; }
    .week-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; touch-action: pan-y; }
    .week-day { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 4px 2px; border-radius: 12px; transition: background 0.15s; }
    .week-day:active { background: var(--cream); }
    .week-day-label { font-size: 10px; font-weight: 900; color: var(--muted); }
    .week-day-label.sun { color: var(--red); }
    .week-day-label.sat { color: var(--blue); }
    .week-day-circle {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid var(--ink);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 900;
      background: #f5f5f5;
      position: relative;
    }
    .week-day-circle.today { background: var(--red); color: white; border-color: var(--red); box-shadow: 0 3px 0 var(--ink); }
    .week-day-circle.has-data { background: var(--cream); }
    .week-day-circle.today.has-data { background: var(--red); color: white; }
    .week-day-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); border: 1px solid var(--ink); position: absolute; bottom: -1px; right: -1px; }
    .week-day-kcal { font-size: 8px; font-weight: 900; color: var(--red); line-height: 1; }
    .week-day-steps { font-size: 8px; font-weight: 900; color: var(--green); line-height: 1; }

    /* ===== 訂正モーダル ===== */
    .edit-modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.75); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
    .edit-modal-overlay.open { display: flex; }
    .edit-modal {
      background: white; border: 4px solid var(--ink);
      border-radius: 22px 22px 0 0;
      padding: 20px; width: 100%; max-width: 440px;
      box-shadow: 0 -6px 0 var(--ink);
      max-height: 85vh; overflow-y: auto;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .edit-modal-title { font-size: 16px; font-weight: 900; text-align: center; margin-bottom: 14px; }
    .edit-steps-row { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
    .edit-steps-row input { flex: 1; }
    .edit-steps-btn { background: var(--blue); color: white; border: 3px solid var(--ink); border-radius: 12px; padding: 10px 16px; font-size: 14px; font-weight: 900; cursor: pointer; white-space: nowrap; box-shadow: 0 4px 0 var(--ink); }
    .edit-steps-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--ink); }
    .edit-section-label { font-size: 12px; font-weight: 900; color: var(--muted); margin-bottom: 8px; border-bottom: 2px solid var(--cream); padding-bottom: 4px; }
    .edit-log-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 2px solid #e5e5ea; font-size: 13px; }
    .edit-log-del { background: var(--red); color: white; border: 2px solid var(--ink); border-radius: 8px; padding: 4px 10px; font-size: 12px; font-weight: 900; cursor: pointer; }
    .edit-add-section { margin-top: 14px; }
    .edit-add-section .suggest-box { position: absolute; top: 100%; left: 0; right: 0; }
    .edit-close-btn { width: 100%; background: var(--ink); color: white; border: none; border-radius: 14px; padding: 12px; font-size: 15px; font-weight: 900; cursor: pointer; margin-top: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>PFCカウンター</h1>
      <div class="subtitle-pill" id="item-count">読み込み中...</div>
    </div>

    <!-- プロフィールサマリー -->
    <div class="card" id="profile-card" style="display:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div class="card-title" style="margin:0;" id="profile-name">－</div>
        <button class="btn-sub btn-purple" onclick="openSettings()" style="width:auto;padding:6px 14px;font-size:12px;">⚙️ 設定</button>
      </div>
      <div class="profile-summary" id="profile-summary"></div>
    </div>

    <!-- 今日のサマリー -->
    <div class="card">
      <div class="status-grid">
        <div class="status-box" style="border-color:var(--red);background:#FFF5F5;">
          <div class="status-label" style="color:var(--red);">残りカロリー</div>
          <div class="status-value" id="cal-remaining">-<span class="status-unit">kcal</span></div>
        </div>
        <div class="status-box" style="border-color:var(--blue);background:#F5F9FF;">
          <div class="status-label" style="color:var(--blue);">残り脂質 (F)</div>
          <div class="status-value" id="fat-remaining">-<span class="status-unit">g</span></div>
        </div>
        <div class="status-box" style="border-color:var(--orange);background:#FFFBF2;">
          <div class="status-label" style="color:var(--orange);">残りタンパク (P)</div>
          <div class="status-value" id="protein-remaining">-<span class="status-unit">g</span></div>
        </div>
        <div class="status-box" style="border-color:var(--green);background:#F5FBF5;">
          <div class="status-label" style="color:var(--green);">残り炭水化物 (C)</div>
          <div class="status-value" id="carbs-remaining">-<span class="status-unit">g</span></div>
        </div>
      </div>
      <div class="sub-status-grid">
        <div class="sub-box">歩数: <span class="sub-val" id="current-steps">0</span>歩</div>
        <div class="sub-box" style="color:var(--green);">消費: <span class="sub-val" id="burn-cal">-</span>kcal</div>
      </div>
    </div>

    <!-- 週間ビュー -->
    <div class="week-card" id="week-card">
      <div class="week-header">
        <div class="week-title" id="week-title">📅 今週</div>
        <div class="week-nav">
          <button class="week-nav-btn" id="week-prev-btn" onclick="changeWeek(-1)">‹</button>
          <button class="week-nav-btn" id="week-next-btn" onclick="changeWeek(1)" disabled>›</button>
        </div>
      </div>
      <div class="week-days" id="week-days"
        ontouchstart="weekSwipeStart(event)"
        ontouchend="weekSwipeEnd(event)">
      </div>
    </div>

    <!-- 食事入力 -->
    <div class="card" style="overflow:visible;">
      <div class="form-group">
        <label>食べたもの <span class="badge">検索</span></label>
        <input type="text" id="food-name" placeholder="牛丼、ラーメン、うどんなど..." autocomplete="off" oninput="searchMenu(this.value)">
        <div class="suggest-box" id="suggest-list"></div>
      </div>
      <div class="qty-row">
        <div class="form-group" style="margin-bottom:0;">
          <label>数量 <span class="badge">倍率</span></label>
          <input type="number" id="food-qty" value="1" step="0.1" min="0.1" inputmode="decimal">
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label>カロリー (kcal)</label>
          <input type="number" id="food-cal" placeholder="0" inputmode="numeric" readonly style="opacity:0.7;">
        </div>
      </div>
      <div class="status-grid" style="margin-top:12px;">
        <div class="form-group">
          <label>脂質 (g)</label>
          <input type="number" id="food-fat" placeholder="0.0" step="0.1" inputmode="decimal" readonly style="opacity:0.7;">
        </div>
        <div class="form-group">
          <label>タンパク質 (g)</label>
          <input type="number" id="food-protein" placeholder="0.0" step="0.1" inputmode="decimal" readonly style="opacity:0.7;">
        </div>
      </div>
      <div class="form-group">
        <label>炭水化物 (g)</label>
        <input type="number" id="food-carbs" placeholder="0.0" step="0.1" inputmode="decimal" readonly style="opacity:0.7;">
      </div>
      <div style="margin-top:8px; font-size:11px; color:var(--muted);">※数量を変えると自動計算されます</div>
      <div style="margin-top:12px;">
        <button class="btn-main" onclick="addLog()">ミッション登録！</button>
      </div>
    </div>

    <!-- 歩数入力 -->
    <div class="card">
      <div class="form-group">
        <label>今日の歩数をこうしん</label>
        <div style="display:flex;gap:8px;">
          <input type="number" id="steps-input" placeholder="例: 13500" inputmode="numeric">
          <button class="btn-main" onclick="updateSteps()" style="width:auto;padding:10px 18px;font-size:14px;border-radius:12px;">更新</button>
        </div>
      </div>
      <div class="btn-grid">
        <button class="btn-sub btn-blue" onclick="clearToday()">今日リセット</button>
        <button class="btn-sub btn-green" onclick="resetAll()">全リセット</button>
      </div>
    </div>

    <!-- 今日のログ -->
    <div class="card">
      <div class="card-title">📋 本日のミッション結果</div>
      <div class="log-list" id="log-container"></div>
    </div>

    <!-- グラフ -->
    <div class="card">
      <div class="card-title">📊 グラフ</div>
      <div class="graph-tab-bar">
        <div class="graph-tab-btn active" onclick="switchGraph('cal-day')">摂取<br>日別</div>
        <div class="graph-tab-btn" onclick="switchGraph('cal-month')">摂取<br>月別</div>
        <div class="graph-tab-btn" onclick="switchGraph('burn-day')">消費<br>日別</div>
        <div class="graph-tab-btn" onclick="switchGraph('burn-month')">消費<br>月別</div>
      </div>
      <canvas id="mainChart" height="200"></canvas>
    </div>
  </div>

  <!-- 設定モーダル -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal">
      <h2>⚙️ プロフィール設定</h2>
      <div class="form-group">
        <label>お名前</label>
        <input type="text" id="s-name" placeholder="例: 小松">
      </div>
      <div class="status-grid">
        <div class="form-group">
          <label>身長 (cm)</label>
          <input type="number" id="s-height" placeholder="176" inputmode="numeric">
        </div>
        <div class="form-group">
          <label>体重 (kg)</label>
          <input type="number" id="s-weight" placeholder="68" inputmode="decimal" step="0.1">
        </div>
      </div>
      <div class="status-grid">
        <div class="form-group">
          <label>年齢</label>
          <input type="number" id="s-age" placeholder="40" inputmode="numeric">
        </div>
        <div class="form-group">
          <label>性別</label>
          <select id="s-gender">
            <option value="male">男性</option>
            <option value="female">女性</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>活動レベル</label>
        <select id="s-activity">
          <option value="1.2">低い（デスクワーク中心）</option>
          <option value="1.55" selected>中程度（週数回運動）</option>
          <option value="1.725">高い（週5以上運動）</option>
          <option value="1.9">非常に高い（毎日激しい運動）</option>
        </select>
      </div>
      <div id="calc-preview" style="background:var(--cream);border:2px solid var(--ink);border-radius:12px;padding:10px 14px;font-size:12px;margin-bottom:16px;line-height:2;display:none;"></div>
      <button class="btn-main" onclick="saveSettings()" style="margin-bottom:8px;">保存する</button>
    </div>
  </div>

  <!-- 訂正モーダル（下からスライド） -->
  <div class="edit-modal-overlay" id="edit-modal-overlay" onclick="closeEditModal(event)">
    <div class="edit-modal" id="edit-modal">
      <div class="edit-modal-title" id="edit-modal-title">📅 訂正</div>

      <!-- 歩数修正 -->
      <div class="edit-section-label">👟 歩数の修正</div>
      <div class="edit-steps-row">
        <input type="number" id="edit-steps-input" placeholder="歩数を入力" inputmode="numeric">
        <button class="edit-steps-btn" onclick="saveEditSteps()">更新</button>
      </div>

      <!-- 食事ログ一覧 -->
      <div class="edit-section-label">🍽️ 食事ログ</div>
      <div id="edit-log-list"></div>

      <!-- 食事追加 -->
      <div class="edit-add-section">
        <div class="edit-section-label">➕ 食事を追加</div>
        <div class="form-group" style="margin-bottom:10px;">
          <input type="text" id="edit-food-name" placeholder="食べたもの..." autocomplete="off" oninput="searchMenuEdit(this.value)">
          <div class="suggest-box" id="edit-suggest-list"></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">
          <div>
            <label style="font-size:11px;">数量</label>
            <input type="number" id="edit-food-qty" value="1" step="0.1" min="0.1" inputmode="decimal">
          </div>
          <div>
            <label style="font-size:11px;">kcal</label>
            <input type="number" id="edit-food-cal" placeholder="0" readonly style="opacity:0.7;">
          </div>
        </div>
        <button class="btn-main" onclick="addEditLog()" style="font-size:15px;padding:12px;">追加する</button>
      </div>

      <button class="edit-close-btn" onclick="closeEditModalDirect()">✕ とじる</button>
    </div>
  </div>

  <script>
    let menuDatabase = [];
    let selectedBase = { cal: 0, fat: 0, protein: 0, carbs: 0 };
    let editSelectedBase = { cal: 0, fat: 0, protein: 0, carbs: 0 };
    let chartInstance = null;
    let currentGraph = 'cal-day';
    let allData = {};
    let profile = null;

    // 週ビュー状態（0=今週、-1=先週、...、-3=3週前）
    let weekOffset = 0;
    let weekSwipeStartX = 0;

    function today() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function dateStrFromDate(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function toHiragana(str) {
      return str.replace(/[\u30A1-\u30F6]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60));
    }
    function normalize(str) { return toHiragana(str.toLowerCase()); }

    function calcTargets(p) {
      let bmr;
      if (p.gender === 'male') {
        bmr = 88.362 + (13.397 * p.weight) + (4.799 * p.height) - (5.677 * p.age);
      } else {
        bmr = 447.593 + (9.247 * p.weight) + (3.098 * p.height) - (4.330 * p.age);
      }
      const tdee = Math.round(bmr * p.activity);
      const targetCal = Math.round(tdee * 0.85);
      const targetProtein = Math.round(p.weight * 2.0);
      const targetFat = Math.round(targetCal * 0.25 / 9);
      const targetCarbs = Math.round((targetCal - targetProtein * 4 - targetFat * 9) / 4);
      return { bmr: Math.round(bmr), tdee, targetCal, targetProtein, targetFat, targetCarbs };
    }

    function calcBurn(steps, p) {
      if (!p) return 2600;
      const t = calcTargets(p);
      return Math.round(t.tdee + steps * 0.04 * (p.weight / 68));
    }

    async function loadCSV() {
      try {
        const res = await fetch('data.csv?v=' + Date.now());
        const text = await res.text();
        menuDatabase = [];
        text.trim().split('\n').forEach(line => {
          const parts = line.split(',');
          if (parts.length >= 5) {
            menuDatabase.push({
              name: parts[0].trim(),
              cal: parseInt(parts[1]) || 0,
              protein: parseFloat(parts[2]) || 0,
              fat: parseFloat(parts[3]) || 0,
              carbs: parseFloat(parts[4]) || 0
            });
          }
        });
        document.getElementById('item-count').textContent = menuDatabase.length + ' ITEMS';
      } catch(e) {
        document.getElementById('item-count').textContent = 'データ読込エラー';
      }
    }

    function searchMenu(query) {
      const box = document.getElementById('suggest-list');
      if (!query) { box.style.display = 'none'; return; }
      const q = normalize(query);
      const filtered = menuDatabase.filter(i => normalize(i.name).includes(q)).slice(0, 12);
      if (!filtered.length) { box.style.display = 'none'; return; }
      box.innerHTML = '';
      filtered.forEach(item => {
        const div = document.createElement('div');
        div.className = 'suggest-item';
        div.innerHTML = `<div>${item.name}</div><div class="suggest-meta">${item.cal}kcal / F:${item.fat}g</div>`;
        div.onclick = () => {
          document.getElementById('food-name').value = item.name;
          selectedBase = { cal: item.cal, fat: item.fat, protein: item.protein, carbs: item.carbs };
          document.getElementById('food-qty').value = '1';
          updateQty();
          box.style.display = 'none';
        };
        box.appendChild(div);
      });
      box.style.display = 'block';
    }

    function searchMenuEdit(query) {
      const box = document.getElementById('edit-suggest-list');
      if (!query) { box.style.display = 'none'; return; }
      const q = normalize(query);
      const filtered = menuDatabase.filter(i => normalize(i.name).includes(q)).slice(0, 12);
      if (!filtered.length) { box.style.display = 'none'; return; }
      box.innerHTML = '';
      filtered.forEach(item => {
        const div = document.createElement('div');
        div.className = 'suggest-item';
        div.innerHTML = `<div>${item.name}</div><div class="suggest-meta">${item.cal}kcal / F:${item.fat}g</div>`;
        div.onclick = () => {
          document.getElementById('edit-food-name').value = item.name;
          editSelectedBase = { cal: item.cal, fat: item.fat, protein: item.protein, carbs: item.carbs };
          document.getElementById('edit-food-qty').value = '1';
          document.getElementById('edit-food-cal').value = item.cal;
          box.style.display = 'none';
        };
        box.appendChild(div);
      });
      box.style.display = 'block';
    }

    document.getElementById('edit-food-qty').addEventListener('input', () => {
      const qty = parseFloat(document.getElementById('edit-food-qty').value) || 1;
      document.getElementById('edit-food-cal').value = Math.round(editSelectedBase.cal * qty);
    });

    function updateQty() {
      const qty = parseFloat(document.getElementById('food-qty').value) || 1;
      document.getElementById('food-cal').value = Math.round(selectedBase.cal * qty);
      document.getElementById('food-fat').value = (selectedBase.fat * qty).toFixed(1);
      document.getElementById('food-protein').value = (selectedBase.protein * qty).toFixed(1);
      document.getElementById('food-carbs').value = (selectedBase.carbs * qty).toFixed(1);
    }

    document.getElementById('food-qty').addEventListener('input', updateQty);

    // 設定
    function openSettings() {
      if (profile) {
        document.getElementById('s-name').value = profile.name || '';
        document.getElementById('s-height').value = profile.height || '';
        document.getElementById('s-weight').value = profile.weight || '';
        document.getElementById('s-age').value = profile.age || '';
        document.getElementById('s-gender').value = profile.gender || 'male';
        document.getElementById('s-activity').value = profile.activity || '1.55';
      }
      document.getElementById('settings-modal').style.display = 'flex';
      updateCalcPreview();
    }

    function updateCalcPreview() {
      const h = parseFloat(document.getElementById('s-height').value);
      const w = parseFloat(document.getElementById('s-weight').value);
      const a = parseInt(document.getElementById('s-age').value);
      const g = document.getElementById('s-gender').value;
      const act = parseFloat(document.getElementById('s-activity').value);
      const preview = document.getElementById('calc-preview');
      if (h && w && a) {
        const t = calcTargets({ height: h, weight: w, age: a, gender: g, activity: act });
        preview.style.display = 'block';
        preview.innerHTML = `基礎代謝: <b>${t.bmr}kcal</b> / 消費目安: <b>${t.tdee}kcal</b><br>摂取目標: <b>${t.targetCal}kcal</b>（15%カット）<br>P: <b>${t.targetProtein}g</b> / F: <b>${t.targetFat}g</b> / C: <b>${t.targetCarbs}g</b>`;
      } else {
        preview.style.display = 'none';
      }
    }

    ['s-height','s-weight','s-age','s-gender','s-activity'].forEach(id => {
      document.getElementById(id).addEventListener('input', updateCalcPreview);
    });

    function saveSettings() {
      const name = document.getElementById('s-name').value.trim();
      const height = parseFloat(document.getElementById('s-height').value);
      const weight = parseFloat(document.getElementById('s-weight').value);
      const age = parseInt(document.getElementById('s-age').value);
      const gender = document.getElementById('s-gender').value;
      const activity = parseFloat(document.getElementById('s-activity').value);
      if (!height || !weight || !age) { alert('身長・体重・年齢を入力してください'); return; }
      profile = { name, height, weight, age, gender, activity };
      localStorage.setItem('pfc_profile', JSON.stringify(profile));
      document.getElementById('settings-modal').style.display = 'none';
      renderProfile();
      render();
      renderGraph(currentGraph);
    }

    function renderProfile() {
      if (!profile) {
        document.getElementById('profile-card').style.display = 'none';
        return;
      }
      document.getElementById('profile-card').style.display = 'block';
      const t = calcTargets(profile);
      const actLabel = { '1.2': '低い', '1.55': '中程度', '1.725': '高い', '1.9': '非常に高い' };
      document.getElementById('profile-name').textContent = `👤 ${profile.name || 'プロフィール'}`;
      document.getElementById('profile-summary').innerHTML =
        `${profile.height}cm / ${profile.weight}kg / ${profile.age}歳 / ${profile.gender === 'male' ? '男性' : '女性'} / 活動: ${actLabel[String(profile.activity)] || '中程度'}<br>` +
        `目標: ${t.targetCal}kcal / P:${t.targetProtein}g / F:${t.targetFat}g / C:${t.targetCarbs}g`;
    }

    function loadData() {
      const savedProfile = localStorage.getItem('pfc_profile');
      if (savedProfile) {
        try { profile = JSON.parse(savedProfile); } catch(e) {}
      }
      const saved = localStorage.getItem('pfc_v9');
      if (saved) { try { allData = JSON.parse(saved); } catch(e) {} }

      if (!profile) {
        document.getElementById('settings-modal').style.display = 'flex';
      } else {
        document.getElementById('settings-modal').style.display = 'none';
        renderProfile();
      }
      render();
      renderWeek();
      renderGraph(currentGraph);
    }

    function saveData() { localStorage.setItem('pfc_v9', JSON.stringify(allData)); }

    function getTodayData() {
      const t = today();
      if (!allData[t]) allData[t] = { logs: [], steps: 0 };
      return allData[t];
    }

    function getDateData(dateStr) {
      if (!allData[dateStr]) allData[dateStr] = { logs: [], steps: 0 };
      return allData[dateStr];
    }

    function getTargets() {
      if (profile) return calcTargets(profile);
      return { targetCal: 2000, targetFat: 55, targetProtein: 135, targetCarbs: 250, tdee: 2600 };
    }

    function render() {
      const d = getTodayData();
      const targets = getTargets();
      let tCal = 0, tFat = 0, tProtein = 0, tCarbs = 0;
      d.logs.forEach(i => { tCal += i.cal; tFat += i.fat; tProtein += i.protein; tCarbs += i.carbs; });
      const burn = calcBurn(d.steps, profile);

      document.getElementById('cal-remaining').innerHTML = `${targets.targetCal - tCal}<span class="status-unit">kcal</span>`;
      document.getElementById('fat-remaining').innerHTML = `${(targets.targetFat - tFat).toFixed(1)}<span class="status-unit">g</span>`;
      document.getElementById('protein-remaining').innerHTML = `${(targets.targetProtein - tProtein).toFixed(1)}<span class="status-unit">g</span>`;
      document.getElementById('carbs-remaining').innerHTML = `${(targets.targetCarbs - tCarbs).toFixed(1)}<span class="status-unit">g</span>`;
      document.getElementById('current-steps').innerText = d.steps.toLocaleString();
      document.getElementById('burn-cal').innerText = burn.toLocaleString();

      const container = document.getElementById('log-container');
      container.innerHTML = '';
      if (!d.logs.length) {
        container.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:12px;padding:15px 0;">ログがありません</div>';
      } else {
        for (let i = d.logs.length - 1; i >= 0; i--) {
          const item = d.logs[i];
          const div = document.createElement('div');
          div.className = 'log-item';
          div.innerHTML = `<div><b>${item.name}</b>${item.qty && item.qty !== 1 ? ` <small>×${item.qty}</small>` : ''}<br><small style="color:var(--muted);">${item.time}</small></div><div class="log-values">${item.cal}kcal/F:${item.fat}g<br><small style="color:var(--muted)">P:${item.protein}/C:${item.carbs}</small></div>`;
          container.appendChild(div);
        }
      }
    }

    // ===== 週間ビュー =====
    function getWeekDates(offset) {
      // offset=0: 今週(月〜日)、-1: 先週、etc
      const now = new Date();
      const dayOfWeek = now.getDay(); // 0=日,1=月,...
      // 月曜始まりにするため調整
      const mondayOffset = (dayOfWeek === 0) ? -6 : 1 - dayOfWeek;
      const monday = new Date(now);
      monday.setDate(now.getDate() + mondayOffset + offset * 7);
      monday.setHours(0,0,0,0);
      const dates = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(monday);
        d.setDate(monday.getDate() + i);
        dates.push(d);
      }
      return dates;
    }

    function renderWeek() {
      const dates = getWeekDates(weekOffset);
      const todayStr = today();
      const dayLabels = ['月','火','水','木','金','土','日'];
      const dayClasses = ['','','','','','sat','sun'];

      // タイトル
      const first = dates[0], last = dates[6];
      const isSameMonth = first.getMonth() === last.getMonth();
      let titleStr;
      if (weekOffset === 0) {
        titleStr = '📅 今週';
      } else if (weekOffset === -1) {
        titleStr = '📅 先週';
      } else {
        titleStr = `📅 ${Math.abs(weekOffset)}週前`;
      }
      document.getElementById('week-title').textContent = titleStr;

      // ナビボタン
      document.getElementById('week-prev-btn').disabled = (weekOffset <= -3);
      document.getElementById('week-next-btn').disabled = (weekOffset >= 0);

      const container = document.getElementById('week-days');
      container.innerHTML = '';

      dates.forEach((date, i) => {
        const dateStr = dateStrFromDate(date);
        const dayData = allData[dateStr];
        const totalCal = dayData ? dayData.logs.reduce((s, x) => s + x.cal, 0) : 0;
        const steps = dayData ? dayData.steps : 0;
        const isToday = (dateStr === todayStr);
        const hasData = dayData && (dayData.logs.length > 0 || dayData.steps > 0);

        const div = document.createElement('div');
        div.className = 'week-day';
        div.onclick = () => openEditModal(dateStr);

        const labelClass = i === 5 ? 'sat' : (i === 6 ? 'sun' : '');
        let circleClass = 'week-day-circle';
        if (isToday) circleClass += ' today';
        else if (hasData) circleClass += ' has-data';

        div.innerHTML = `
          <div class="week-day-label ${labelClass}">${dayLabels[i]}</div>
          <div class="${circleClass}">
            ${date.getDate()}
            ${hasData ? '<span class="week-day-dot"></span>' : ''}
          </div>
          <div class="week-day-kcal">${totalCal > 0 ? totalCal+'k' : ''}</div>
          <div class="week-day-steps">${steps > 0 ? Math.round(steps/1000*10)/10+'k' : ''}</div>
        `;
        container.appendChild(div);
      });
    }

    function changeWeek(dir) {
      const next = weekOffset + dir;
      if (next < -3 || next > 0) return;
      weekOffset = next;
      renderWeek();
    }

    // スワイプ
    function weekSwipeStart(e) {
      weekSwipeStartX = e.touches[0].clientX;
    }
    function weekSwipeEnd(e) {
      const dx = e.changedTouches[0].clientX - weekSwipeStartX;
      if (Math.abs(dx) < 40) return;
      if (dx < 0) changeWeek(-1); // 左スワイプ → 前の週
      else changeWeek(1);          // 右スワイプ → 次の週
    }

    // ===== 訂正モーダル =====
    let editTargetDate = '';

    function openEditModal(dateStr) {
      editTargetDate = dateStr;
      const d = getDateData(dateStr);

      // タイトル
      const [y, m, day] = dateStr.split('-');
      const dateObj = new Date(parseInt(y), parseInt(m)-1, parseInt(day));
      const dayNames = ['日','月','火','水','木','金','土'];
      document.getElementById('edit-modal-title').textContent =
        `📅 ${m}月${day}日（${dayNames[dateObj.getDay()]}）の訂正`;

      // 歩数
      document.getElementById('edit-steps-input').value = d.steps || '';

      // ログ一覧
      renderEditLogList(d);

      // 追加フォームリセット
      document.getElementById('edit-food-name').value = '';
      document.getElementById('edit-food-qty').value = '1';
      document.getElementById('edit-food-cal').value = '';
      editSelectedBase = { cal: 0, fat: 0, protein: 0, carbs: 0 };
      document.getElementById('edit-suggest-list').style.display = 'none';

      document.getElementById('edit-modal-overlay').classList.add('open');
    }

    function renderEditLogList(d) {
      const container = document.getElementById('edit-log-list');
      container.innerHTML = '';
      if (!d.logs.length) {
        container.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:8px 0;">ログなし</div>';
        return;
      }
      d.logs.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = 'edit-log-item';
        div.innerHTML = `
          <div>
            <b style="font-size:13px;">${item.name}</b>${item.qty && item.qty !== 1 ? ` <small>×${item.qty}</small>` : ''}
            <br><small style="color:var(--muted);">${item.cal}kcal / F:${item.fat}g / ${item.time}</small>
          </div>
          <button class="edit-log-del" onclick="deleteEditLog(${idx})">🗑️</button>
        `;
        container.appendChild(div);
      });
    }

    function deleteEditLog(idx) {
      if (!confirm('このログを削除しますか？')) return;
      const d = getDateData(editTargetDate);
      d.logs.splice(idx, 1);
      saveData();
      renderEditLogList(d);
      // 今日なら上部サマリーも更新
      if (editTargetDate === today()) { render(); }
      renderWeek();
      renderGraph(currentGraph);
    }

    function saveEditSteps() {
      const v = parseInt(document.getElementById('edit-steps-input').value);
      if (isNaN(v) || v < 0) { alert('正しい歩数をいれてね'); return; }
      getDateData(editTargetDate).steps = v;
      saveData();
      if (editTargetDate === today()) { render(); }
      renderWeek();
      renderGraph(currentGraph);
      // 入力欄に保存済み反映
      document.getElementById('edit-steps-input').value = v;
    }

    function addEditLog() {
      const n = document.getElementById('edit-food-name').value.trim();
      const qty = parseFloat(document.getElementById('edit-food-qty').value) || 1;
      if (!n || !editSelectedBase.cal) { alert('食べたものを検索して選んでね'); return; }
      const now = new Date();
      // 過去日なら時刻は「手入力」表示
      const isToday = (editTargetDate === today());
      const timeStr = isToday
        ? `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`
        : '手入力';
      const d = getDateData(editTargetDate);
      d.logs.push({
        name: n,
        qty,
        cal: Math.round(editSelectedBase.cal * qty),
        fat: parseFloat((editSelectedBase.fat * qty).toFixed(1)),
        protein: parseFloat((editSelectedBase.protein * qty).toFixed(1)),
        carbs: parseFloat((editSelectedBase.carbs * qty).toFixed(1)),
        time: timeStr
      });
      saveData();
      renderEditLogList(d);
      if (isToday) { render(); }
      renderWeek();
      renderGraph(currentGraph);
      // フォームリセット
      document.getElementById('edit-food-name').value = '';
      document.getElementById('edit-food-qty').value = '1';
      document.getElementById('edit-food-cal').value = '';
      editSelectedBase = { cal: 0, fat: 0, protein: 0, carbs: 0 };
    }

    function closeEditModal(e) {
      if (e.target === document.getElementById('edit-modal-overlay')) {
        closeEditModalDirect();
      }
    }
    function closeEditModalDirect() {
      document.getElementById('edit-modal-overlay').classList.remove('open');
    }

    function addLog() {
      const n = document.getElementById('food-name').value.trim();
      const qty = parseFloat(document.getElementById('food-qty').value) || 1;
      const c = parseInt(document.getElementById('food-cal').value) || 0;
      const f = parseFloat(document.getElementById('food-fat').value) || 0;
      const p = parseFloat(document.getElementById('food-protein').value) || 0;
      const cb = parseFloat(document.getElementById('food-carbs').value) || 0;
      if (!n) { alert('食べたものを入力してね'); return; }
      const now = new Date();
      const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
      getTodayData().logs.push({ name: n, qty, cal: c, fat: f, protein: p, carbs: cb, time: timeStr });
      document.getElementById('food-name').value = '';
      document.getElementById('food-qty').value = '1';
      ['food-cal','food-fat','food-protein','food-carbs'].forEach(id => document.getElementById(id).value = '');
      selectedBase = { cal: 0, fat: 0, protein: 0, carbs: 0 };
      saveData(); render(); renderWeek(); renderGraph(currentGraph);
    }

    function updateSteps() {
      const v = parseInt(document.getElementById('steps-input').value);
      if (isNaN(v) || v < 0) { alert('正しい歩数をいれてね'); return; }
      getTodayData().steps = v;
      document.getElementById('steps-input').value = '';
      saveData(); render(); renderWeek(); renderGraph(currentGraph);
    }

    function clearToday() {
      if (confirm('今日のログをリセットしますか？')) {
        allData[today()] = { logs: [], steps: 0 };
        saveData(); render(); renderWeek(); renderGraph(currentGraph);
      }
    }
    function resetAll() {
      if (confirm('全データをリセットしますか？')) {
        allData = {}; saveData(); render(); renderWeek(); renderGraph(currentGraph);
      }
    }

    function switchGraph(type) {
      currentGraph = type;
      document.querySelectorAll('.graph-tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', ['cal-day','cal-month','burn-day','burn-month'][i] === type);
      });
      renderGraph(type);
    }

    function getLast30Days() {
      const days = [];
      for (let i = 29; i >= 0; i--) {
        const d = new Date(); d.setDate(d.getDate() - i);
        days.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
      }
      return days;
    }

    function getLast6Months() {
      const months = [];
      for (let i = 5; i >= 0; i--) {
        const d = new Date(); d.setMonth(d.getMonth() - i);
        months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
      }
      return months;
    }

    function renderGraph(type) {
      const ctx = document.getElementById('mainChart').getContext('2d');
      if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
      let labels = [], data = [], color = '', title = '';

      if (type === 'cal-day') {
        const days = getLast30Days();
        labels = days.map(d => d.slice(5));
        data = days.map(d => { const day = allData[d]; return day ? day.logs.reduce((s, i) => s + i.cal, 0) : 0; });
        color = '#E60012'; title = '摂取カロリー（直近30日）';
      } else if (type === 'cal-month') {
        const months = getLast6Months();
        labels = months.map(m => m.slice(5) + '月');
        data = months.map(m => {
          let total = 0;
          Object.keys(allData).forEach(d => { if (d.startsWith(m)) total += allData[d].logs.reduce((s, i) => s + i.cal, 0); });
          return total;
        });
        color = '#E60012'; title = '摂取カロリー（月別）';
      } else if (type === 'burn-day') {
        const days = getLast30Days();
        labels = days.map(d => d.slice(5));
        data = days.map(d => { const day = allData[d]; return calcBurn(day ? day.steps : 0, profile); });
        color = '#43B047'; title = '消費カロリー（直近30日）';
      } else if (type === 'burn-month') {
        const months = getLast6Months();
        labels = months.map(m => m.slice(5) + '月');
        data = months.map(m => {
          let total = 0, count = 0;
          Object.keys(allData).forEach(d => { if (d.startsWith(m)) { total += calcBurn(allData[d].steps, profile); count++; } });
          return count > 0 ? Math.round(total / count) : calcBurn(0, profile);
        });
        color = '#43B047'; title = '消費カロリー平均（月別）';
      }

      chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{ label: title, data, backgroundColor: color + '99', borderColor: color, borderWidth: 2, borderRadius: 4 }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.parsed.y + 'kcal' } } },
          scales: {
            x: { ticks: { font: { size: 9 }, maxRotation: 45 } },
            y: { ticks: { font: { size: 10 }, callback: v => v + 'kcal' } }
          }
        }
      });
    }

    document.addEventListener('click', e => {
      if (e.target.id !== 'food-name') document.getElementById('suggest-list').style.display = 'none';
      if (e.target.id !== 'edit-food-name') document.getElementById('edit-suggest-list').style.display = 'none';
    });

    loadCSV();
    loadData();
  </script>
