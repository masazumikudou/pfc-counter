<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Black background -->
  <circle cx="50" cy="50" r="50" fill="#111"/>

  <!-- Fork (left, vertical) -->
  <g fill="white">
    <rect x="21"   y="12" width="2.2" height="20" rx="1.1"/>
    <rect x="24.3" y="12" width="2.2" height="20" rx="1.1"/>
    <rect x="27.6" y="12" width="2.2" height="20" rx="1.1"/>
    <rect x="20.5" y="29" width="9.5" height="3"/>
    <rect x="23.5" y="30" width="3.2" height="21"/>
    <rect x="22"   y="50" width="6.2" height="27" rx="3.1"/>
  </g>

  <!-- Spoon (right, vertical) -->
  <g fill="white">
    <ellipse cx="75" cy="23" rx="6.5" ry="10"/>
    <rect x="73.8" y="32" width="2.5" height="19"/>
    <rect x="72"   y="50" width="6"   height="27" rx="3"/>
  </g>

  <!-- Plate -->
  <circle cx="50" cy="52" r="22" fill="white"/>

  <!-- PFC bold text -->
  <text x="50" y="58"
        text-anchor="middle"
        fill="#111"
        font-family="'Arial Black', Arial, sans-serif"
        font-size="15"
        font-weight="900"
        letter-spacing="1">PFC</text>
</svg>
